<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Tienda Musical</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <h1>Listado de productos</h1>

    <p><a href="/">Volver al inicio</a></p>

    <h2 id="titulo-formulario">Agregar producto</h2>

    <form id="form-producto">
      <input type="hidden" id="id_producto">

      <input type="text" id="nombre" placeholder="Nombre" required>
      <input type="text" id="descripcion" placeholder="Descripción">
      <input type="text" id="marca" placeholder="Marca" required>
      <input type="number" id="precio_venta" placeholder="Precio" step="0.01" required>
      <input type="number" id="stock_actual" placeholder="Stock actual" required>
      <input type="number" id="stock_minimo" placeholder="Stock mínimo" required>
      <input type="number" id="id_categoria" placeholder="ID categoría" required>
      <input type="number" id="id_proveedor" placeholder="ID proveedor" required>

      <button type="submit" id="btn-guardar">Guardar producto</button>
      <button type="button" id="btn-cancelar" style="display: none;">Cancelar edición</button>
    </form>

    <p id="mensaje"></p>

    <table id="tabla-productos">
      <thead>
        <tr>
          <th>ID</th>
          <th>Producto</th>
          <th>Marca</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Categoría</th>
          <th>Proveedor</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/js/productos.js"></script>
</body>
</html>
